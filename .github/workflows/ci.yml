name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - name: Verify committed artifacts
        run: pytest tests/test_inference.py
      - name: Rebuild artifacts
        run: python -m scripts.train_models
      - name: Run tests
        run: pytest
      - name: Smoke-test Streamlit entrypoint
        run: python -c "import app"
